mvp_launch_gate:
  earliest_milestone: milestone.controlled_market_mvp_launch
  milestone_number: 20
  launch_type: controlled_design_partner_or_paid_pilot
  not_allowed_before:
    - milestone.external_human_benchmark_calibration
    - milestone.discovery_coverage_completion
    - milestone.calibration_backed_evidence_readiness_gates
  boundary: launch as calibrated synthetic research support, not replacement-grade human market proof

solo_user_mvp_activation_gate:
  earliest_milestone: milestone.frontend_to_codex_live_experiment_runtime
  milestone_number: 27
  launch_type: solo_founder_or_researcher_local_mvp
  current_status: implemented_for_local_solo_user
  current_decision: M27 completed the personal MVP activation gate because the normal frontend product surface now completes live Codex-backed synthetic research loops for concept validation, prototype comprehension validation, and pain/empathy/insight discovery with evidence review, decision logging, and share-boundary preservation
  not_allowed_before:
    - milestone.scaled_public_launch_readiness
  required_workflows:
    - founder_concept_validation
    - ui_prototype_comprehension_validation
    - pain_empathy_insight_discovery
  required_frontend_loop:
    - Ask
    - Clarify
    - Confirm Plan
    - Run
    - Review Evidence
    - Compare
    - Decide
    - Share With Boundary
  required_acceptance:
    - concept validation must expose understanding, objections, trust gaps, appeal, adoption barriers, evidence boundaries, and decision logging from the frontend
    - prototype comprehension validation must expose artifact handling, wording confusion, CTA/button ambiguity, flow friction, observed/action-grounded evidence where available, and human-validation gaps from the frontend
    - pain/empathy/insight discovery must route plain-language intent into the right discovery mode without making internal mode taxonomy the default mental model
    - every workflow must complete without CLI operation or raw artifact inspection
  boundary: personal MVP requires frontend-started live Codex-backed synthetic research with visible evidence boundaries; it is not replacement-grade market proof

public_launch_readiness_gate:
  earliest_milestone: milestone.frontend_to_codex_live_experiment_runtime
  milestone_number: 27
  launch_type: broader_self_serve_or_public_launch
  not_allowed_before:
    - milestone.controlled_market_mvp_launch
    - milestone.production_api_and_deployment_boundary
    - milestone.team_collaboration_and_governance_hardening
    - milestone.persona_library_and_human_difference_calibration
    - milestone.longitudinal_study_and_panel_learning
    - milestone.regulated_and_high_stakes_review_boundary
    - milestone.scaled_public_launch_readiness
  boundary: public launch can sell bounded synthetic research workflows only after public-claim readiness and frontend live-experiment activation are both credible; it still cannot claim replacement-grade reliability

replacement_readiness_claim_gate:
