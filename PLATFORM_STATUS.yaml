current_platform_state:
  current_stage: backend_foundation_complete_workspace_ui_readiness_next
  strategic_focus: use the completed backend foundation while closing the remaining evidence-query gap and moving the operator workflow toward workspace UI readiness
  proven_capabilities:
    - reusable persona generation
    - structured synthetic interviews
    - observer-controlled interviews
    - panel synthesis
    - conversation realism scoring
    - over-optimism warnings
    - static image stimulus review for prototype validation
    - multi-screen flow stimulus review for prototype validation
    - application-supplied observed action trace contract and synthesis for prototype validation
    - manifest-backed clickable prototype task execution with platform-captured observed action traces
    - shared run contract artifacts across validation runs, facilitated interviews, observer-controlled interviews, and concept panels
    - SQLite-first metadata projection for runs, interviews, personas, and artifact paths while preserving JSON and filesystem artifacts as the primary record
    - relational persona selection indexes with trait provenance and similarity edges while keeping full persona profiles in JSON artifacts
    - authenticated workspace-scoped API ingress for queued validation jobs
    - queue-backed local worker runtime for validation job execution beyond one-shot CLI runs
    - enforced workspace role gates, billing gates, plan quotas, path isolation, and retention-driven artifact purge
  not_yet_proven:
    - complete discovery-stage coverage
    - live-interface behavior validation beyond scripted clickable manifests
    - action-grounded adoption prediction across repeated interface runs
  next_moves:
    - finish evidence query index and replay as the last backend-foundation gap before broader productization
    - start the workspace shell, run submission UI, and queue-status views on top of the shared runtime
    - add workspace evidence browsing, replay affordances, and richer worker observability before broader tenant-admin expansion
    - add browser-driven clickable execution only after the query and replay surface can keep observed evidence auditable
    - review whether MongoDB document storage or a graph projection is warranted only after the implemented selection index hits repeated similarity or diversity traversal bottlenecks

