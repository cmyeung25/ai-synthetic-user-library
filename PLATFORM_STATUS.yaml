blockers:
  - id: blocker.persona_coverage_gap
    severity: high
    detail: the Frontline picker now exposes and preserves persona-panel selection, but broader public launch still lacks calibrated evidence that persona coverage is sufficient across markets, domains, languages, and repeated human benchmarks

  - id: blocker.prototype_calibration_gap
    severity: medium
    detail: the platform now has fixture-backed and first external benchmark calibration, but browser-observed traces still need broader external human benchmark coverage before replacement-grade claims

  - id: blocker.adoption_prediction_gap
    severity: medium
    detail: the platform can score synthetic adoption signals against attached human-reviewed outcomes, but it still cannot claim broad adoption prediction reliability without more external benchmarks
