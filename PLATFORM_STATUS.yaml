    next_step: sequence directly into clickable prototype validation

  - id: stimulus.interactive_prototype_validation
    type: prototype_capability
    status: implemented
    priority: P1
    research_stage: prototype_validation
    improves:
      - decision_prediction
      - evidence_quality
    bottleneck: action-grounded evidence needs a clickable task loop, not just stated reaction
    evidence:
      - clickable and live-app stimulus types are accepted in src/ai_validation_swarm/cli/main.py and src/ai_validation_swarm/facilitator/runtime.py
      - application-supplied observed action traces are normalized through src/ai_validation_swarm/domain/validators.py and persisted into interview artifacts
      - prototype synthesis, transcript, and insight outputs now distinguish observed_action_trace from task-guided self-report when real actions are supplied
      - scripted clickable prototype manifests are now executed through src/ai_validation_swarm/facilitator/stimulus_executor.py, producing task-loop traces before synthesis
      - browser-captured clickable and live-app event logs are now normalized through BrowserBehaviorTraceExecutor before synthesis, preserving URL, selector, driver, and safety-gate metadata
    task_count_total: 3
    task_count_completed: 3
    story_points_total: 8
    story_points_completed: 8
    story_points_remaining: 0
    completion_pct: 100.0
    remaining_gap: richer browser drivers can be added later, but they must emit the same browser-behavior trace contract and remain inside the safety gate
    next_step: use repeated browser traces as one input to human calibration and replacement-readiness evaluation

  - id: stimulus.live_app_task_simulation
    type: prototype_capability
    status: implemented
    priority: P2
    research_stage: prototype_validation
    improves:
      - decision_prediction
      - evidence_quality
    bottleneck: live product simulation needs browser-observed task traces while keeping credentialed, destructive, and high-stakes flows outside automatic execution
    evidence:
      - BrowserBehaviorTraceExecutor accepts live_app stimulus artifacts with browser event logs and emits live_app_browser_trace analysis when routed by the runtime
      - browser event logs are normalized into observed-action-trace/v1 so existing Milestone 12 query, replay, reliability, and audit-lineage surfaces can consume them
      - safety gate blocks credentialed, high-stakes, external, destructive, payment, checkout, delete, publish, revoke, token, password, bank, submit, and transfer traces before synthesis
    task_count_total: 3
    task_count_completed: 3
    story_points_total: 8
    story_points_completed: 8
    story_points_remaining: 0
    completion_pct: 100.0
