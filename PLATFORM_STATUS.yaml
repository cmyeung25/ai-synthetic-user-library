      - covered by runtime coverage requirements and evidence gate rules in src/ai_validation_swarm/facilitator/runtime.py
      - verified by unit tests for facilitator and observer runtimes
    remaining_gap: keep improving realism and synthesis quality, but the decision-event contract exists as first-class runtime surface
    next_step: calibrate interview quality and preserve the event-level evidence boundary

  - id: interview_mode.validate_hypothesis
    type: interview_mode
    status: implemented
    priority: P0
