      - evidence_quality
    bottleneck: the platform cannot claim interface-level validation until it can handle stimuli and observed behavior
    evidence:
      - supported as an explicit interview_mode in src/ai_validation_swarm/cli/main.py
      - covered by runtime coverage requirements and prototype-validation gate rules in src/ai_validation_swarm/facilitator/runtime.py
      - backed by a dedicated prototype synthesis contract in src/ai_validation_swarm/facilitator/providers.py and prompts/prototype-synthesis/v1.md
      - now snapshots real image and flow artifacts, runs structured stimulus review, and injects stimulus analysis into facilitated and observer-controlled runtimes
