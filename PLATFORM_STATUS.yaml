    remaining_gap: should wait until the core research mode layer is complete
    next_step: revisit after phase 1 mode coverage is complete

  - id: stimulus.image_stimulus_review
    type: prototype_capability
    status: implemented
    priority: P0
    research_stage: prototype_validation
    improves:
