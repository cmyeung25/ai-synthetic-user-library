blockers:
  - id: blocker.discovery_mode_gap
    severity: high
    detail: the platform still lacks fuller discovery coverage because workflow mapping remains deferred, even though pain discovery and decision reconstruction now exist

  - id: blocker.prototype_calibration_gap
    severity: medium
    detail: the platform now has a fixture-backed human calibration workflow, but browser-observed traces still need broader external human benchmark coverage before replacement-grade claims

  - id: blocker.adoption_prediction_gap
    severity: medium
    detail: the platform can score synthetic adoption signals against attached human-reviewed outcomes, but it still cannot claim broad adoption prediction reliability without more external benchmarks
