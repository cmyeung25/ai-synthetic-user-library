capabilities:
  - id: interview_mode.pain_point_discovery
    type: interview_mode
    status: implemented
    priority: P0
    research_stage: discovery
    improves:
      - evidence_quality
      - scalable_research_throughput
    bottleneck: discovery coverage is incomplete without a dedicated problem-reality interview mode
    evidence:
      - supported as an explicit interview_mode in src/ai_validation_swarm/cli/main.py
      - covered by runtime coverage requirements in src/ai_validation_swarm/facilitator/runtime.py
      - verified by unit tests for facilitator and observer runtimes
    remaining_gap: keep improving realism and downstream synthesis quality, but the mode exists as first-class runtime surface
    next_step: calibrate interview quality and keep the problem-discovery evidence boundary disciplined

  - id: interview_mode.explore_root_cause
    type: interview_mode
    status: implemented
    priority: P0
