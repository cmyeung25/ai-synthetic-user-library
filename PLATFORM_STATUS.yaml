      - structured static-image review is generated through the facilitator provider schema in src/ai_validation_swarm/facilitator/providers.py
      - facilitator, observer, transcript, and insight artifacts now include the derived stimulus review context
      - verified by unit tests for facilitator, observer, and OpenAI client transports
