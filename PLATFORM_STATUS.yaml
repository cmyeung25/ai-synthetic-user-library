      - scalable_research_throughput
    bottleneck: teams need a way to test causal or behavioral hypotheses without leading the participant
    evidence:
      - listed as implemented in DEVELOPMENT_ROADMAP.md
      - included in the current facilitated interview runtime surface
    remaining_gap: maintain contradiction-seeking interview quality
    next_step: keep refining audit discipline and realism controls

  - id: interview_mode.concept_validation
    type: interview_mode
    status: implemented
    priority: P0
    research_stage: concept_evaluation
    improves:
      - decision_prediction
      - scalable_research_throughput
    bottleneck: concept-stage work needs structured objection, trust-gap, and stated-adoption testing
    evidence:
      - listed as implemented in DEVELOPMENT_ROADMAP.md
      - included in the current facilitated interview runtime surface
    remaining_gap: concept evidence must stay separate from prototype behavior evidence
    next_step: keep concept introduction discipline and over-optimism warnings explicit

  - id: interview_mode.prototype_validation
    type: interview_mode
    status: implemented
    priority: P0
    research_stage: prototype_validation
    improves:
      - decision_prediction
      - evidence_quality
    bottleneck: the platform cannot claim interface-level validation until it can handle stimuli and observed behavior
    evidence:
      - supported as an explicit interview_mode in src/ai_validation_swarm/cli/main.py
      - covered by runtime coverage requirements and prototype-validation gate rules in src/ai_validation_swarm/facilitator/runtime.py
      - backed by a dedicated prototype synthesis contract in src/ai_validation_swarm/facilitator/providers.py and prompts/prototype-synthesis/v1.md
      - now snapshots real image and flow artifacts, runs structured stimulus review, and injects stimulus analysis into facilitated and observer-controlled runtimes
      - now accepts application-supplied clickable and live-app observed action trace artifacts, normalizes them through shared validators, and upgrades prototype evidence outputs to observed_action_trace when real actions are supplied
      - now executes scripted clickable prototype manifests through a native stimulus executor adapter before the interview starts, producing platform-captured observed_action_trace artifacts
      - now accepts browser-observed clickable and live-app event logs through BrowserBehaviorTraceExecutor and promotes them into the same observed_action_trace evidence contract with safety-gated boundaries
      - verified by unit tests for facilitator and observer runtimes
    remaining_gap: the mode now supports static image review, flow review, application-supplied action traces, scripted clickable task execution, browser-observed trace ingestion, and fixture-backed human calibration, but still needs broader external benchmark coverage for replacement-grade claims
    next_step: expand attached human-reviewed outcomes across more prototype and browser-observed evidence types

  - id: interview_mode.adoption_barrier_validation
    type: interview_mode
    status: implemented
    priority: P0
    research_stage: concept_evaluation_and_prototype_validation
    improves:
      - decision_prediction
      - behavioral_realism
    bottleneck: stated value is not enough if the platform cannot simulate why adoption still fails in practice
    evidence:
      - supported as an explicit interview_mode in src/ai_validation_swarm/cli/main.py
      - covered by runtime coverage requirements and adoption-gate rules in src/ai_validation_swarm/facilitator/runtime.py
      - verified by unit tests for facilitator and observer runtimes
    remaining_gap: keep calibrating barrier realism and preserve the distinction between stated usefulness and routine adoption conditions, but the mode exists as first-class runtime surface
    next_step: calibrate interview quality and keep setup, permission, trust, pricing, reversibility, and workflow friction distinct from generic concept appeal

  - id: interview_mode.workflow_mapping
    type: interview_mode
    status: planned
    priority: P1
