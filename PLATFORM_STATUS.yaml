  - id: interview_mode.prototype_validation
    type: interview_mode
    status: implemented
    priority: P0
    research_stage: prototype_validation
    improves:
      - decision_prediction
      - evidence_quality
    bottleneck: the platform cannot claim interface-level validation until it can handle stimuli and observed behavior
    evidence:
      - supported as an explicit interview_mode in src/ai_validation_swarm/cli/main.py
      - covered by runtime coverage requirements and prototype-validation gate rules in src/ai_validation_swarm/facilitator/runtime.py
      - backed by a dedicated prototype synthesis contract in src/ai_validation_swarm/facilitator/providers.py and prompts/prototype-synthesis/v1.md
      - now snapshots real image and flow artifacts, runs structured stimulus review, and injects stimulus analysis into facilitated and observer-controlled runtimes
      - now accepts application-supplied clickable and live-app observed action trace artifacts, normalizes them through shared validators, and upgrades prototype evidence outputs to observed_action_trace when real actions are supplied
      - now executes scripted clickable prototype manifests through a native stimulus executor adapter before the interview starts, producing platform-captured observed_action_trace artifacts
      - verified by unit tests for facilitator and observer runtimes
    remaining_gap: the mode now supports static image review, flow review, application-supplied action traces, and scripted clickable task execution, but it still lacks browser-driven and live-app execution beyond manifest-backed prototypes
    next_step: extend the executor boundary to browser-driven clickable prototypes and later live-app surfaces

