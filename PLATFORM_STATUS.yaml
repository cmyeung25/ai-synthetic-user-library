  - id: stimulus.flow_stimulus_review
    type: prototype_capability
    status: implemented
    priority: P1
    research_stage: prototype_validation
    improves:
      - evidence_quality
      - scalable_research_throughput
    bottleneck: image review alone cannot cover multi-step comprehension breakdown
    evidence:
      - real flow artifacts can now be supplied as ordered image directories or JSON manifests in src/ai_validation_swarm/facilitator/runtime.py
      - multi-screen flow review is generated through the facilitator provider schema in src/ai_validation_swarm/facilitator/providers.py
      - facilitator, observer, transcript, and insight artifacts now include multi-screen transition confusion, setup burden, and likely drop-off context
      - verified by unit tests for facilitator, observer, and OpenAI client transports
