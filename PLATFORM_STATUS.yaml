          - demo/workspace_ui_moss_stage11/index.html now proves that the same evidence-query projection can stay intact inside an integrated workspace shell rather than only a standalone review page
          - src/ai_validation_swarm/saas/evidence_query.py now serves completed-run evidence-query payloads from the structured metadata store and artifact paths through the local SaaS runtime
          - src/ai_validation_swarm/saas/api.py now exposes GET /api/v1/evidence-query with authenticated browser-callable CORS support for the workspace shell
          - src/ai_validation_swarm/saas/runtime.py and src/ai_validation_swarm/saas/api.py now compose and serve GET /api/v1/workspace-shell so session state, selected-job state, evidence-query state, and runtime sync can hydrate from one backend snapshot
