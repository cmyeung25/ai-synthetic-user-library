blockers:
  - id: blocker.discovery_mode_gap
    severity: high
    detail: the platform still lacks fuller discovery coverage because workflow mapping remains deferred, even though pain discovery and decision reconstruction now exist

  - id: blocker.prototype_evidence_gap
    severity: high
    detail: the platform now supports scripted clickable prototype execution, but still lacks browser-driven and live-app capture beyond manifest-backed task loops

  - id: blocker.adoption_prediction_gap
    severity: medium
    detail: the platform can now simulate concept-stage adoption barriers, but it still cannot ground adoption prediction in observed interface behavior
