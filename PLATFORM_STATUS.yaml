current_platform_state:
  current_stage: backend_foundation_complete_workspace_ui_readiness_complete_full_saas_product_surface_complete_evidence_reliability_complete_real_user_workspace_complete_browser_behavior_validation_complete_human_calibration_complete_post_login_ia_planned
  strategic_focus: expand human calibration coverage beyond the checked-in fixture while keeping replacement-readiness scoped by research stage and evidence type, then implement the accepted post-login workspace IA as a bounded product-surface workstream
  proven_capabilities:
    - reusable persona generation
    - structured synthetic interviews
    - observer-controlled interviews
    - panel synthesis
    - conversation realism scoring
    - over-optimism warnings
    - static image stimulus review for prototype validation
    - multi-screen flow stimulus review for prototype validation
    - application-supplied observed action trace contract and synthesis for prototype validation
    - manifest-backed clickable prototype task execution with platform-captured observed action traces
    - shared run contract artifacts across validation runs, facilitated interviews, observer-controlled interviews, and concept panels
    - SQLite-first metadata projection for runs, interviews, personas, and artifact paths while preserving JSON and filesystem artifacts as the primary record
    - relational persona selection indexes with trait provenance and similarity edges while keeping full persona profiles in JSON artifacts
    - authenticated workspace-scoped API ingress for queued validation jobs
    - authenticated workspace-session summary for workspace, billing, limits, and job-count context
    - backend-driven workspace-shell snapshot hydration for session, selected-job, evidence-query, and runtime-sync state
    - queue-backed local worker runtime for validation job execution beyond one-shot CLI runs
    - enforced workspace role gates, billing gates, plan quotas, path isolation, and retention-driven artifact purge
    - reusable workspace-console design-system CSS foundation and low-fi flow prototype for the planned conversational workspace UI
    - a local authenticated workspace shell can now start from research intent, attach prototype artifacts, confirm an inferred plan, submit a live validation job, inspect evidence, replay core research artifacts, and surface initial cross-run comparison guidance without dropping back to raw CLI or filesystem inspection
    - the local SaaS wrapper now hosts the first same-origin Milestone 11 shell entrypoint at `/app/workspace`, serving the study-first shell from the same runtime origin as the authenticated API
    - the same hosted shell is now route-aware for project, study, saved-evidence-view, decision-log, export-bundle, share-bundle, support-snapshot, and job deep links through backend-injected route context plus shared detail-loader bootstrap
    - the local SaaS wrapper now prefers a framework-owned frontend host build under `frontend/workspace_shell_app/dist/` for those `/app/*` routes, while still injecting backend route context and preserving the same shared Stage 15 controller
    - the framework host now owns the full visible Stage 15 shell surface as React-rendered sections, including workspace/session/settings/project/study controls, study-workspace intake, run review, collaboration, export/share, support, and debug trace, while the shared shell controller still owns the interaction and route-bootstrap logic so component migration can proceed without losing study-first behavior
    - the Stage 15 hosted shell now mounts through a dedicated entry module at `demo/workspace_ui_moss_stage15/workspace_shell_stage15_app.mjs`, so route bootstrap and product-surface event wiring are no longer trapped inside one inline HTML module
    - the Stage 15 hosted shell now exchanges `?token=...` bootstrap links for a server-backed same-origin browser session, letting clean `/app/*` revisits and authenticated API calls flow through an HttpOnly cookie while keeping explicit query tokens authoritative and exposing an in-shell end-session control
    - the same local SaaS runtime now persists study-scoped saved evidence views plus decision logs, materializes those collaboration artifacts under the workspace collaboration root, and emits collaboration audit events
    - the Stage 15 hosted shell now lets the selected study load, create, and reselect saved evidence views plus decision logs from the same product surface instead of reconstructing review state from raw runs each time
    - the same study-first shell now also supports first-pass decision review inside the selected decision surface, with threaded decision comments plus `draft`, `in_review`, `approved`, and `needs_revision` review state attached to the same decision log
    - the same hosted shell now also projects a study-scoped activity timeline from audit-backed events, so cross-artifact run, collaboration, export/share, and support actions stay visible inside the selected study
    - a first workspace-settings governance surface now exists inside the hosted shell, exposing membership, billing-overview, quota/retention visibility, and API token lifecycle without direct SQLite or filesystem edits
    - that same governance surface now also supports writable billing and quota updates for the local SaaS runtime, including plan-tier, billing-status, seat-count, renewal, and effective limit changes
    - that same governance surface now also supports workspace audit-history loading and filtering, so operator and governance events are visible from the product shell instead of only persisted in the runtime store
    - the first React/Vite framework-hosted workspace shell slice now exists under `frontend/workspace_shell_app`, reusing the Stage 15 shell document and shared shell contracts instead of reimplementing product behavior in framework-local state
    - live browser smoke verification on 2026-06-28 now proves that the hosted Stage 15 shell can create a project and study, submit a live job, reopen the completed job route for evidence refresh, create export/share/support artifacts, and validate the viewer-safe public share boundary without dropping into CLI or filesystem inspection
    - Milestone 12 evidence reliability now exists as backend-owned `evidence_reliability` and `audit_lineage` payloads with stability labels, stability score, supporting evidence, contradiction and missing-context review, calibration records, replay focus, selected evidence provenance, and synthetic-boundary text
    - study-linked validation jobs now enrich cross-run comparison and audit lineage with workspace job, project, and study identifiers while preserving nullable linkage for legacy runs without workspace metadata
    - the hosted Stage 15 smoke now verifies clean `/app/jobs/{job_id}` route hydration after browser-session bootstrap plus critical-action and critical-panel layout acceptance gates so visual overlap is part of automated product-shell acceptance
    - the first Milestone 13 real-user page layer now exists inside the React/Vite framework host, with a shared page model for New Study, Study Workspace, Evidence Review, and the default research loop
    - Milestone 14 browser behavior validation now accepts browser-observed clickable and live-app event logs, normalizes them into observed-action traces, persists the trace artifacts, and safety-gates credentialed, high-stakes, external, destructive, payment, delete, publish, token, and transfer flows before synthesis
    - Milestone 15 human calibration now attaches fixture-backed human-reviewed outcomes to comparable synthetic runs, scores precision, recall, F1, and alignment, writes human_calibration artifacts, and projects human benchmark alignment into backend-owned evidence reliability records
  not_yet_proven:
    - complete discovery-stage coverage
    - broad external benchmark coverage across markets, domains, and repeated live human studies
    - replacement-grade reliability across research stages or high-stakes domains
  next_moves:
    - expand human calibration beyond the checked-in fixture to external benchmark datasets and manually reviewed real study outcomes
    - evaluate whether browser-observed task failures, objections, trust gaps, adoption barriers, and decision changes converge with broader human-reviewed outcomes
    - keep replacement-readiness thresholds scoped by research stage and evidence type instead of making a blanket platform claim
    - keep reliability scoring, contradiction review, calibration records, and audit lineage backend-owned while calibration records are attached to browser-observed and interview evidence
    - continue framework-host component decomposition and hosted identity hardening only where it preserves the backend-owned shell, route, and evidence contracts
    - implement the accepted post-login workspace IA as a bounded product-surface workstream after preserving Milestone 15 calibration momentum
    - keep the product-shell acceptance gates for visual overlap, text occlusion, and fixed or sticky layers blocking primary research actions in every hosted smoke path
    - add a FastAPI adapter only after the framework-hosted frontend, WSGI route contracts, and worker boundary are stable enough for a thin ASGI/OpenAPI wrapper
    - expand browser behavior capture drivers only when their output remains inside the Milestone 12 query, replay, audit-lineage, and safety-boundary contracts
    - review whether MongoDB document storage or a graph projection is warranted only after the implemented selection index hits repeated similarity or diversity traversal bottlenecks
  accepted_architecture_decisions:
    - id: decision.framework_hosted_workspace_frontend
      status: accepted
      decision: use the current React/Vite workspace shell as the first framework-hosted implementation slice, while keeping Next.js as a later hosted-routing and production-session option
      improves:
        - scalable_research_throughput
        - evidence_quality
        - auditability
      evidence:
        - DEVELOPMENT_ROADMAP.md now records the accepted framework migration decision
        - frontend/workspace_shell_app now provides the first React/Vite shell host for the Stage 15 workspace surface
      boundary: preserve backend-owned workspace-shell snapshot, evidence-query, replay, and audit contracts; do not move simulation or evidence ranking into frontend state
    - id: decision.fastapi_thin_adapter_later
      status: accepted
      decision: add FastAPI only as a thin ASGI/OpenAPI adapter after the framework-hosted frontend, current WSGI route contract, and worker boundary are stable
      improves:
        - scalable_research_throughput
        - evidence_quality
      evidence:
        - DEVELOPMENT_ROADMAP.md keeps fastapi_thin_api_adapter planned behind framework_hosted_workspace_frontend
      boundary: FastAPI must call existing Python runtime modules and worker/job contracts, not replace the research core

