    remaining_gap: the mode now supports static image review, flow review, application-supplied action traces, and scripted clickable task execution, but it still lacks browser-driven and live-app execution beyond manifest-backed prototypes
    next_step: extend the executor boundary to browser-driven clickable prototypes and later live-app surfaces

