active_workstreams:
  - id: workstream.complete_core_interview_modes
    status: in_progress
    focus:
      - interview_mode.prototype_validation
    why_now: prototype validation is now the last missing core interview mode before the facilitated interview runtime can claim full phase-1 mode coverage

  - id: workstream.prototype_validation_contract
    status: in_progress
    focus:
      - interview_mode.prototype_validation
      - stimulus.image_stimulus_review
    why_now: with adoption-barrier mode landed, the next platform bottleneck is defining a stimulus-aware evidence contract before claiming prototype validation

blockers:
  - id: blocker.discovery_mode_gap
    severity: high
    detail: the platform still lacks fuller discovery coverage because workflow mapping remains deferred, even though pain discovery and decision reconstruction now exist

  - id: blocker.prototype_evidence_gap
    severity: high
    detail: the platform does not yet distinguish concept-only self-report from prototype behavior evidence through a real stimulus layer

  - id: blocker.adoption_prediction_gap
    severity: medium
    detail: the platform can now simulate concept-stage adoption barriers, but it still cannot ground adoption prediction in observed interface behavior
